<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LogiSchool Games · Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="leaderboard">
    <div class="app">
      <header class="topbar">
        <a class="brand" href="index.html">
          <div class="badge">LS</div>
          LogiSchool Games
        </a>
        <div class="topbar-right" id="userArea"></div>
      </header>

      <section class="section">
        <h2>Leaderboard</h2>
        <div class="card" style="padding: 18px;">
          <table class="table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="leaderboardTable"></tbody>
          </table>
        </div>
        <div class="notice" id="leaderboardHint" style="margin-top: 12px;">
          Global leaderboard will appear here once connected.
        </div>
      </section>
    </div>

    <div class="toast" id="toast"></div>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/games.js"></script>
  </body>
</html>
